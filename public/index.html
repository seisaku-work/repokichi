<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レポきち - 新規日報作成</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f9; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .logo-header { text-align: center; margin-bottom: 30px; }
        .logo-header img { max-width: 350px; width: 100%; height: auto; }
        .card { background: #fff; border-radius: 12px; padding: 25px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        h2 { color: #3498db; border-bottom: 2px solid #eaf2f8; padding-bottom: 10px; margin-top: 0; font-size: 1.2em; }
        h3 { color: #555; margin-top: 30px; margin-bottom: 10px; font-size: 1em; border-left: 4px solid #3498db; padding-left: 10px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #dcdfe6; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        textarea { height: 100px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grid-4-col { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .btn { width: 100%; padding: 15px; font-size: 1.1em; font-weight: bold; color: #fff; background: #3498db; border: none; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #2980b9; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .data-table th, .data-table td { padding: 8px; text-align: center; border: 1px solid #e0e0e0; }
        .data-table th { background-color: #f7f9fc; font-size: 0.9em; }
        .data-table td:first-child { text-align: left; font-weight: bold; background-color: #f7f9fc; }
        .data-table input { text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-header">
            <img src="/repokichi.png" alt="レポきち ロゴ">
        </div>
        <div class="card">
            <h2>基本情報</h2>
            <div class="grid">
                <div><label for="date">日付</label><input type="date" id="date"></div>
                <div><label for="author">入力者名</label><input type="text" id="author" placeholder="（ログイン機能で自動入力予定）"></div>
            </div>
        </div>
        <div class="card">
            <h2>制作課 入力項目</h2>
            <table class="data-table" id="seisaku-table">
                <thead>
                    <tr><th>キャンパス</th><th>ホームページOC予約数</th><th>Instagram</th><th>TikTok</th></tr>
                </thead>
                <tbody>
                    <tr data-campus="大阪校"><td>大阪校</td><td><input type="number" value="0" class="hp-oc"></td><td><input type="number" value="0" class="sns-follower" data-platform="Instagram"></td><td><input type="number" value="0" class="sns-follower" data-platform="TikTok"></td></tr>
                    <tr data-campus="神戸校"><td>神戸校</td><td><input type="number" value="0" class="hp-oc"></td><td><input type="number" value="0" class="sns-follower" data-platform="Instagram"></td><td><input type="number" value="0" class="sns-follower" data-platform="TikTok"></td></tr>
                    <tr data-campus="ベルブラ"><td>ベルブラ</td><td><input type="number" value="0" class="hp-oc"></td><td><input type="number" value="0" class="sns-follower" data-platform="Instagram"></td><td><input type="number" value="0" class="sns-follower" data-platform="TikTok"></td></tr>
                    <tr data-campus="熊本校"><td>熊本校</td><td><input type="number" value="0" class="hp-oc"></td><td><input type="number" value="0" class="sns-follower" data-platform="Instagram"></td><td><input type="number" value="0" class="sns-follower" data-platform="TikTok"></td></tr>
                </tbody>
            </table>
        </div>

        <div class="card" id="gakusei-card">
            <h2>学生課 入力項目</h2>

            <!-- ★★★ ここからが今回の修正部分です ★★★ -->
            <h3>OCエントリー数（大阪校）</h3>
            <div class="grid">
                <div><label>美容科 新規</label><input type="number" value="0" class="oc-entry" data-campus="大阪校" data-dept="美容科" data-type="新規"></div>
                <div><label>美容科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="大阪校" data-dept="美容科" data-type="リピーター"></div>
            </div>

            <h3>OCエントリー数（神戸校）</h3>
            <div class="grid-4-col">
                <div><label>美容科 新規</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="美容科" data-type="新規"></div>
                <div><label>美容科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="美容科" data-type="リピーター"></div>
                <div><label>TB科 新規</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="TB科" data-type="新規"></div>
                <div><label>TB科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="TB科" data-type="リピーター"></div>
                <div><label>WP科 新規</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="WP科" data-type="新規"></div>
                <div><label>WP科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="WP科" data-type="リピーター"></div>
                <div><label>BS科 新規</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="BS科" data-type="新規"></div>
                <div><label>BS科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="神戸校" data-dept="BS科" data-type="リピーター"></div>
            </div>

            <h3>OCエントリー数（ベルブラ）</h3>
            <div class="grid-4-col">
                <div><label>TB科 新規</label><input type="number" value="0" class="oc-entry" data-campus="ベルブラ" data-dept="TB科" data-type="新規"></div>
                <div><label>TB科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="ベルブラ" data-dept="TB科" data-type="リピーター"></div>
                <div><label>WP科 新規</label><input type="number" value="0" class="oc-entry" data-campus="ベルブラ" data-dept="WP科" data-type="新規"></div>
                <div><label>WP科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="ベルブラ" data-dept="WP科" data-type="リピーター"></div>
                <div><label>BS科 新規</label><input type="number" value="0" class="oc-entry" data-campus="ベルブラ" data-dept="BS科" data-type="新規"></div>
                <div><label>BS科 リピ</label><input type="number" value="0" class="oc-entry" data-campus="ベルブラ" data-dept="BS科" data-type="リピーター"></div>
            </div>

            <!-- 熊本校の学科構成が未確定のため、確認後にここに追加します -->
            <!-- ★★★ 修正ここまで ★★★ -->

            <h3 style="margin-top: 30px;">出席項目</h3>
            <div class="grid-3-col">
                <div><label>午前</label><input type="number" value="0" class="attendance" data-name="午前"></div>
                <div><label>午後</label><input type="number" value="0" class="attendance" data-name="午後"></div>
                <div><label>入試まるわかり講座</label><input type="number" value="0" class="attendance" data-name="入試まるわかり講座"></div>
            </div>

            <h3 style="margin-top: 30px;">特記事項</h3>
            <textarea id="remarks" placeholder="特記事項があれば入力してください"></textarea>
        </div>

        <button class="btn" id="saveButton">日報を保存する</button>
    </div>
    <script>
        document.getElementById('date').value = new Date().toISOString().split('T')[0];
        document.getElementById('saveButton').addEventListener('click', () => {
            alert('現在、UIを構築中です。保存機能は後ほど実装します。');
        });
    </script>
</body>
</html>
